<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface": "#faf9fc",
                        "surface-container-highest": "#e0e2ec",
                        "inverse-on-surface": "#9d9ca0",
                        "on-tertiary-fixed-variant": "#4d5870",
                        "error-container": "#fe8983",
                        "on-secondary": "#f8f8ff",
                        "tertiary-container": "#d1ddfa",
                        "primary-fixed-dim": "#d4d4d4",
                        "on-tertiary": "#f9f8ff",
                        "on-secondary-fixed-variant": "#595b63",
                        "tertiary-fixed": "#d1ddfa",
                        "primary-fixed": "#e2e2e2",
                        "on-primary-container": "#525252",
                        "secondary-dim": "#50535a",
                        "on-surface": "#2f323a",
                        "outline": "#787a84",
                        "on-error-container": "#752121",
                        "surface-tint": "#5e5e5e",
                        "on-tertiary-container": "#434e66",
                        "on-background": "#2f323a",
                        "on-primary": "#f8f8f8",
                        "tertiary-fixed-dim": "#c3cfeb",
                        "surface-container": "#ededf4",
                        "inverse-surface": "#0d0e11",
                        "secondary-fixed-dim": "#d2d4dd",
                        "inverse-primary": "#ffffff",
                        "outline-variant": "#afb1bc",
                        "error": "#9f403d",
                        "on-tertiary-fixed": "#303c53",
                        "on-secondary-container": "#4f5259",
                        "secondary-fixed": "#e0e2eb",
                        "surface-container-high": "#e7e8f0",
                        "surface-dim": "#d7d9e6",
                        "surface-container-low": "#f4f3f8",
                        "surface-bright": "#faf9fc",
                        "on-secondary-fixed": "#3c3f46",
                        "on-primary-fixed-variant": "#5b5b5b",
                        "on-surface-variant": "#5c5f68",
                        "surface-container-lowest": "#ffffff",
                        "primary-container": "#e2e2e2",
                        "primary": "#5e5e5e",
                        "secondary-container": "#e0e2eb",
                        "background": "#faf9fc",
                        "surface-variant": "#e0e2ec",
                        "on-primary-fixed": "#3f3f3f",
                        "tertiary-dim": "#48536b",
                        "primary-dim": "#525252",
                        "secondary": "#5c5f66",
                        "on-error": "#fff7f6",
                        "tertiary": "#545f78",
                        "error-dim": "#4e0309"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Manrope', sans-serif; }
        h1, h2, h3 { font-family: 'Manrope', sans-serif; }
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col font-headline">
<!-- Top Navigation Anchor -->
<header class="bg-surface dark:bg-[#1A1C1E] flex items-center w-full px-4 py-4 max-w-screen-xl mx-auto">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary dark:text-[#f4f3f8] cursor-pointer active:scale-95 duration-200" data-icon="arrow_back">arrow_back</span>
<h1 class="font-manrope font-extrabold text-on-surface dark:text-[#ffffff] text-lg tracking-tight">Barcode Matcher</h1>
</div>
</header>
<!-- Main Scanner Canvas -->
<main class="flex-grow flex flex-col items-center justify-start px-4 max-w-screen-xl mx-auto w-full pt-4">
<div class="w-full max-w-2xl space-y-6">
<!-- Focused Scan Input - Width Optimized -->
<div class="flex items-center gap-3 w-full">
<input class="flex-grow min-w-0 bg-white border-2 border-surface-container-highest rounded-lg py-4 px-5 text-xl font-headline font-extrabold tracking-widest text-on-surface focus:ring-2 focus:ring-primary focus:border-transparent transition-all duration-300 shadow-sm" type="text" value="SKU-90210"/>
<button class="flex-shrink-0 h-16 w-16 bg-surface-container-highest text-primary border-2 border-primary/10 rounded-lg hover:bg-surface-container-low active:scale-95 transition-all duration-200 flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-2xl font-bold" data-icon="photo_camera">photo_camera</span>
</button>
</div>
<!-- Results & Compact List -->
<div class="flex flex-col space-y-4 w-full">
<!-- Compact Status Indicator -->
<div class="flex items-center justify-between px-1 flex-wrap gap-2">
<div class="flex items-center gap-2">
<h2 class="text-xs font-extrabold uppercase tracking-widest text-on-surface-variant">Batch Items (4)</h2>
<span class="text-[10px] font-bold text-[#2e7d32] bg-[#e8f5e9] px-2 py-0.5 rounded-full border border-[#2e7d32]/20">1/4 Matched</span>
</div>
<!-- Small integrated status icon -->
<div class="flex items-center gap-1.5 px-3 py-1.5 bg-surface-container-low rounded-lg">
<span class="material-symbols-outlined text-lg text-[#2e7d32]" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="text-[10px] font-extrabold uppercase text-[#2e7d32]">Matched</span>
</div>
</div>
<!-- Barcode Checklist - COMPACT GRID -->
<div class="grid grid-cols-1 gap-2">
<!-- Scanned Item (Compact) -->
<div class="flex items-center justify-between px-4 py-3.5 rounded-lg border border-[#2e7d32] bg-[#e8f5e9]/40 transition-all">
<div class="flex items-center gap-3">
<div class="w-2.5 h-2.5 rounded-full bg-[#2e7d32]"></div>
<span class="text-sm font-bold font-manrope text-[#2e7d32] tracking-tight">SKU-90210</span>
</div>
<div class="flex items-center gap-2">
<span class="text-[10px] font-bold text-[#2e7d32] uppercase opacity-70">Just Now</span>
<span class="material-symbols-outlined text-base text-[#2e7d32]" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
<!-- Pending Items (Compact Single Line) -->
<div class="flex items-center justify-between px-4 py-3.5 rounded-lg border border-outline-variant/30 bg-surface-container-lowest transition-all">
<div class="flex items-center gap-3">
<div class="w-2.5 h-2.5 rounded-full bg-outline-variant"></div>
<span class="text-sm font-bold font-manrope text-on-surface opacity-60 tracking-tight">SKU-44129</span>
</div>
<span class="text-[10px] font-bold text-on-surface-variant uppercase">Pending</span>
</div>
<div class="flex items-center justify-between px-4 py-3.5 rounded-lg border border-outline-variant/30 bg-surface-container-lowest transition-all">
<div class="flex items-center gap-3">
<div class="w-2.5 h-2.5 rounded-full bg-outline-variant"></div>
<span class="text-sm font-bold font-manrope text-on-surface opacity-60 tracking-tight">SKU-77031</span>
</div>
<span class="text-[10px] font-bold text-on-surface-variant uppercase">Pending</span>
</div>
<div class="flex items-center justify-between px-4 py-3.5 rounded-lg border border-outline-variant/30 bg-surface-container-lowest transition-all">
<div class="flex items-center gap-3">
<div class="w-2.5 h-2.5 rounded-full bg-outline-variant"></div>
<span class="text-sm font-bold font-manrope text-on-surface opacity-60 tracking-tight">SKU-11204</span>
</div>
<span class="text-[10px] font-bold text-on-surface-variant uppercase">Pending</span>
</div>
<!-- Mock items for scrolling demo -->
<div class="flex items-center justify-between px-4 py-3.5 rounded-lg border border-outline-variant/30 bg-surface-container-lowest transition-all">
<div class="flex items-center gap-3">
<div class="w-2.5 h-2.5 rounded-full bg-outline-variant"></div>
<span class="text-sm font-bold font-manrope text-on-surface opacity-60 tracking-tight">SKU-55291</span>
</div>
<span class="text-[10px] font-bold text-on-surface-variant uppercase">Pending</span>
</div>
<div class="flex items-center justify-between px-4 py-3.5 rounded-lg border border-outline-variant/30 bg-surface-container-lowest transition-all">
<div class="flex items-center gap-3">
<div class="w-2.5 h-2.5 rounded-full bg-outline-variant"></div>
<span class="text-sm font-bold font-manrope text-on-surface opacity-60 tracking-tight">SKU-22308</span>
</div>
<span class="text-[10px] font-bold text-on-surface-variant uppercase">Pending</span>
</div>
</div>
</div>
</div>
</main>
<!-- Bottom Navigation Shell - Unified with home screen -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-[#ffffff]/80 dark:bg-[#1A1C1E]/80 backdrop-blur-xl z-50 shadow-[0px_-12px_32px_rgba(47,50,58,0.06)]">
<!-- Tools Tab (Active) -->
<a class="flex flex-col items-center justify-center bg-[#5e5e5e] text-[#ffffff] rounded-xl px-5 py-2 transition-all active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined mb-1" data-icon="grid_view">grid_view</span>
<span class="font-manrope text-[11px] font-bold uppercase tracking-wider">Tools</span>
</a>
<!-- History Tab -->
<a class="flex flex-col items-center justify-center text-[#5c5f68] dark:text-[#afb1bc] px-5 py-2 hover:text-[#5e5e5e] dark:hover:text-[#ffffff] active:scale-90 transition-transform duration-150" href="#">
<span class="material-symbols-outlined mb-1" data-icon="history">history</span>
<span class="font-manrope text-[11px] font-bold uppercase tracking-wider">History</span>
</a>
<!-- Settings Tab -->
<a class="flex flex-col items-center justify-center text-[#5c5f68] dark:text-[#afb1bc] px-5 py-2 hover:text-[#5e5e5e] dark:hover:text-[#ffffff] active:scale-90 transition-transform duration-150" href="#">
<span class="material-symbols-outlined mb-1" data-icon="settings">settings</span>
<span class="font-manrope text-[11px] font-bold uppercase tracking-wider">Settings</span>
</a>
</nav>
<!-- Spacer for fixed bottom nav -->
<div class="h-24"></div>
</body></html>
