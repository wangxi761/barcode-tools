<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-dim": "#48536b",
                        "surface-tint": "#5e5e5e",
                        "outline-variant": "#afb1bc",
                        "on-secondary-container": "#4f5259",
                        "tertiary-fixed-dim": "#c3cfeb",
                        "on-surface": "#2f323a",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary": "#f8f8ff",
                        "primary-dim": "#525252",
                        "secondary-fixed": "#e0e2eb",
                        "error-container": "#fe8983",
                        "primary-fixed": "#e2e2e2",
                        "surface-dim": "#d7d9e6",
                        "on-primary-fixed": "#3f3f3f",
                        "surface": "#faf9fc",
                        "on-error": "#fff7f6",
                        "on-surface-variant": "#5c5f68",
                        "surface-container": "#ededf4",
                        "error-dim": "#4e0309",
                        "tertiary-fixed": "#d1ddfa",
                        "primary-fixed-dim": "#d4d4d4",
                        "on-tertiary-container": "#434e66",
                        "outline": "#787a84",
                        "surface-container-highest": "#e0e2ec",
                        "on-tertiary-fixed-variant": "#4d5870",
                        "surface-container-high": "#e7e8f0",
                        "secondary-dim": "#50535a",
                        "primary-container": "#e2e2e2",
                        "inverse-primary": "#ffffff",
                        "error": "#9f403d",
                        "tertiary-container": "#d1ddfa",
                        "surface-container-low": "#f4f3f8",
                        "on-primary": "#f8f8ff",
                        "surface-bright": "#faf9fc",
                        "on-primary-container": "#525252",
                        "inverse-surface": "#0d0e11",
                        "on-tertiary": "#f9f8ff",
                        "on-error-container": "#752121",
                        "secondary-container": "#e0e2eb",
                        "on-background": "#2f323a",
                        "primary": "#5e5e5e",
                        "secondary-fixed-dim": "#d2d4dd",
                        "secondary": "#5c5f66",
                        "background": "#faf9fc",
                        "on-primary-fixed-variant": "#5b5b5b",
                        "on-tertiary-fixed": "#303c53",
                        "surface-variant": "#e0e2ec",
                        "on-secondary-fixed": "#3c3f46",
                        "tertiary": "#545f78",
                        "on-secondary-fixed-variant": "#595b63",
                        "inverse-on-surface": "#9d9ca0"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Manrope', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-surface text-on-surface selection:bg-primary/10">
<!-- TopAppBar -->
<header class="bg-white/80 dark:bg-[#1A1C1E]/80 backdrop-blur-xl shadow-[0px_12px_32px_rgba(47,50,58,0.06)] fixed top-0 w-full z-50">
<div class="flex items-center justify-between px-6 h-16 w-full">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#5e5e5e] dark:text-[#afb1bc] active:scale-95 transition-transform cursor-pointer">arrow_back</span>
<h1 class="font-headline font-bold text-xl tracking-tight text-[#5e5e5e] dark:text-[#ffffff]">Barcode Matcher</h1>
</div>
<div class="flex items-center gap-6">
<span class="hidden md:block font-headline font-black text-[#5e5e5e] dark:text-[#ffffff] uppercase tracking-widest text-xs">Precisionist</span>
</div>
</div>
</header>
<main class="min-h-screen pt-32 pb-32 px-6 flex flex-col items-center max-w-2xl mx-auto">
<!-- Page Title - Editorial Asymmetry -->
<div class="w-full mb-12">
<h2 class="text-display-lg font-headline font-extrabold text-primary leading-tight text-4xl md:text-5xl tracking-tighter">
                Barcode Matcher
            </h2>
<div class="h-1 w-12 bg-primary mt-4 rounded-full"></div>
</div>
<!-- Section 1: Segmented Toggle -->
<div class="w-full bg-surface-container-low p-1.5 rounded-xl flex mb-12 shadow-sm">
<button class="flex-1 py-3 px-4 rounded-xl text-sm font-label font-bold bg-surface-container-lowest text-primary shadow-[0px_4px_12px_rgba(0,0,0,0.03)] transition-all duration-200">
                Manual Input
            </button>
<button class="flex-1 py-3 px-4 rounded-xl text-sm font-label font-medium text-on-surface-variant hover:opacity-70 transition-all duration-200">
                File Upload
            </button>
</div>
<!-- Section 2: Contextual Area (Manual Input Active) -->
<div class="w-full flex-grow flex flex-col">
<div class="relative w-full h-full min-h-[300px] bg-surface-container-lowest rounded-xl shadow-[0px_12px_32px_rgba(47,50,58,0.06)] overflow-hidden transition-all border border-transparent focus-within:border-primary/10">
<textarea class="w-full h-full p-8 bg-transparent border-none focus:ring-0 text-on-surface font-body text-base placeholder:text-outline-variant/60 resize-none leading-relaxed" placeholder="Enter or paste barcodes here...
One barcode per line"></textarea>
<!-- Precision Accents -->
<div class="absolute top-0 right-0 p-4">
<div class="flex gap-1">
<div class="w-1.5 h-1.5 rounded-full bg-surface-container-highest"></div>
<div class="w-1.5 h-1.5 rounded-full bg-surface-container-highest"></div>
</div>
</div>
<div class="absolute bottom-4 right-6 text-[10px] font-label font-bold text-outline-variant tracking-widest uppercase opacity-40">
                    Input Ready
                </div>
</div>
</div>
</main>
<!-- Section 3: Prominent Footer CTA -->
<div class="fixed bottom-20 left-0 w-full px-6 pb-8 pt-4 bg-gradient-to-t from-surface via-surface/95 to-transparent z-40">
<div class="max-w-2xl mx-auto">
<button class="w-full py-5 bg-gradient-to-b from-primary to-primary-dim text-on-primary font-headline font-extrabold text-sm tracking-[0.2em] rounded-xl shadow-[0px_8px_24px_rgba(94,94,94,0.2)] active:scale-95 transition-all duration-200 flex items-center justify-center gap-3">
                START SCANNING
            </button>
</div>
</div>
<!-- BottomNavBar -->
<nav class="bg-white/80 dark:bg-[#1A1C1E]/80 backdrop-blur-xl border-t border-[#afb1bc]/15 shadow-[0px_-4px_24px_rgba(0,0,0,0.04)] fixed bottom-0 w-full z-50 rounded-t-none">
<div class="flex justify-around items-center h-20 px-4 pb-safe w-full">
<a class="flex flex-col items-center justify-center text-[#5e5e5e] dark:text-[#ffffff] font-bold hover:bg-[#f4f3f8] dark:hover:bg-[#2f323a] transition-colors rounded-xl px-4 py-2 active:scale-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">grid_view</span>
<span class="font-['Inter'] text-[11px] font-medium tracking-wide">Tools</span>
</a>
<a class="flex flex-col items-center justify-center text-[#5c5f68] dark:text-[#afb1bc] hover:bg-[#f4f3f8] dark:hover:bg-[#2f323a] transition-colors rounded-xl px-4 py-2 active:scale-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined mb-1">history</span>
<span class="font-['Inter'] text-[11px] font-medium tracking-wide">History</span>
</a>
<a class="flex flex-col items-center justify-center text-[#5c5f68] dark:text-[#afb1bc] hover:bg-[#f4f3f8] dark:hover:bg-[#2f323a] transition-colors rounded-xl px-4 py-2 active:scale-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined mb-1">settings</span>
<span class="font-['Inter'] text-[11px] font-medium tracking-wide">Settings</span>
</a>
</div>
</nav>
<!-- Visual Decoration (Subtle Background elements) -->
<div class="fixed top-0 right-0 -z-10 w-1/3 h-1/2 bg-gradient-to-bl from-surface-container-high/30 to-transparent opacity-50 blur-3xl pointer-events-none"></div>
<div class="fixed bottom-0 left-0 -z-10 w-1/4 h-1/3 bg-gradient-to-tr from-primary/5 to-transparent opacity-30 blur-2xl pointer-events-none"></div>
</body></html>
