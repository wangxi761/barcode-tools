<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Barcode Tools</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-fixed-variant": "#595b63",
                        "tertiary-dim": "#48536b",
                        "background": "#faf9fc",
                        "inverse-primary": "#ffffff",
                        "surface-bright": "#faf9fc",
                        "outline": "#787a84",
                        "tertiary-fixed-dim": "#c3cfeb",
                        "primary-fixed-dim": "#d4d4d4",
                        "on-secondary": "#f8f8ff",
                        "tertiary-fixed": "#d1ddfa",
                        "on-surface-variant": "#5c5f68",
                        "surface-container": "#ededf4",
                        "on-primary-fixed": "#3f3f3f",
                        "on-secondary-fixed": "#3c3f46",
                        "on-primary-container": "#525252",
                        "on-tertiary-container": "#434e66",
                        "primary": "#5e5e5e",
                        "on-secondary-container": "#4f5259",
                        "surface-tint": "#5e5e5e",
                        "on-surface": "#2f323a",
                        "tertiary": "#545f78",
                        "inverse-on-surface": "#9d9ca0",
                        "surface-container-high": "#e7e8f0",
                        "surface-dim": "#d7d9e6",
                        "surface-variant": "#e0e2ec",
                        "error-container": "#fe8983",
                        "surface": "#faf9fc",
                        "on-tertiary-fixed-variant": "#4d5870",
                        "inverse-surface": "#0d0e11",
                        "secondary-dim": "#50535a",
                        "secondary-container": "#e0e2eb",
                        "error-dim": "#4e0309",
                        "secondary": "#5c5f66",
                        "surface-container-low": "#f4f3f8",
                        "outline-variant": "#afb1bc",
                        "surface-container-highest": "#e0e2ec",
                        "on-tertiary": "#f9f8ff",
                        "on-error-container": "#752121",
                        "error": "#9f403d",
                        "on-tertiary-fixed": "#303c53",
                        "on-primary": "#f8f8f8",
                        "primary-container": "#e2e2e2",
                        "on-background": "#2f323a",
                        "secondary-fixed": "#e0e2eb",
                        "on-error": "#fff7f6",
                        "primary-dim": "#525252",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed": "#e2e2e2",
                        "on-primary-fixed-variant": "#5b5b5b",
                        "tertiary-container": "#d1ddfa",
                        "secondary-fixed-dim": "#d2d4dd"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #faf9fc;
        }
        h1, h2, h3 {
            font-family: 'Manrope', sans-serif;
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="w-full top-0 sticky z-50 no-border bg-[#faf9fc] dark:bg-slate-950 flex justify-between items-center px-6 py-4">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#5e5e5e] dark:text-slate-300" data-icon="qr_code_scanner">qr_code_scanner</span>
<h1 class="font-['Manrope'] font-bold tracking-tight text-xl font-black text-[#2f323a] dark:text-slate-100 uppercase tracking-widest">SCANNER</h1>
</div>
<div class="w-10 h-10 rounded-xl bg-surface-container-high flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="account_circle">account_circle</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 px-6 pt-12 pb-32 max-w-lg mx-auto w-full flex flex-col justify-center">
<!-- 2-Column Minimalist Grid -->
<div class="grid grid-cols-2 gap-4">
<!-- Tool 1: Barcode Matcher -->
<button class="aspect-square bg-surface-container-lowest rounded-xl flex flex-col items-center justify-center gap-4 shadow-[0px_12px_32px_rgba(47,50,58,0.04)] active:scale-95 transition-transform group">
<div class="w-12 h-12 flex items-center justify-center text-primary group-hover:text-primary-dim transition-colors">
<span class="material-symbols-outlined text-4xl" data-icon="qr_code_scanner">qr_code_scanner</span>
</div>
<span class="font-headline font-bold text-[10px] uppercase tracking-[0.15em] text-on-surface-variant">Barcode Matcher</span>
</button>
<!-- Tool 2: Generate QR -->
<button class="aspect-square bg-surface-container-lowest rounded-xl flex flex-col items-center justify-center gap-4 shadow-[0px_12px_32px_rgba(47,50,58,0.04)] active:scale-95 transition-transform group">
<div class="w-12 h-12 flex items-center justify-center text-primary group-hover:text-primary-dim transition-colors">
<span class="material-symbols-outlined text-4xl" data-icon="add_box">add_box</span>
</div>
<span class="font-headline font-bold text-[10px] uppercase tracking-[0.15em] text-on-surface-variant">Generate QR</span>
</button>
<!-- Tool 3: Batch Scan -->
<button class="aspect-square bg-surface-container-lowest rounded-xl flex flex-col items-center justify-center gap-4 shadow-[0px_12px_32px_rgba(47,50,58,0.04)] active:scale-95 transition-transform group">
<div class="w-12 h-12 flex items-center justify-center text-primary group-hover:text-primary-dim transition-colors">
<span class="material-symbols-outlined text-4xl" data-icon="layers">layers</span>
</div>
<span class="font-headline font-bold text-[10px] uppercase tracking-[0.15em] text-on-surface-variant">Batch Scan</span>
</button>
<!-- Tool 4: History -->
<button class="aspect-square bg-surface-container-lowest rounded-xl flex flex-col items-center justify-center gap-4 shadow-[0px_12px_32px_rgba(47,50,58,0.04)] active:scale-95 transition-transform group">
<div class="w-12 h-12 flex items-center justify-center text-primary group-hover:text-primary-dim transition-colors">
<span class="material-symbols-outlined text-4xl" data-icon="history">history</span>
</div>
<span class="font-headline font-bold text-[10px] uppercase tracking-[0.15em] text-on-surface-variant">History</span>
</button>
<!-- Tool 5: Inventory -->
<button class="aspect-square bg-surface-container-lowest rounded-xl flex flex-col items-center justify-center gap-4 shadow-[0px_12px_32px_rgba(47,50,58,0.04)] active:scale-95 transition-transform group">
<div class="w-12 h-12 flex items-center justify-center text-primary group-hover:text-primary-dim transition-colors">
<span class="material-symbols-outlined text-4xl" data-icon="inventory_2">inventory_2</span>
</div>
<span class="font-headline font-bold text-[10px] uppercase tracking-[0.15em] text-on-surface-variant">Inventory</span>
</button>
<!-- Tool 6: Settings -->
<button class="aspect-square bg-surface-container-lowest rounded-xl flex flex-col items-center justify-center gap-4 shadow-[0px_12px_32px_rgba(47,50,58,0.04)] active:scale-95 transition-transform group">
<div class="w-12 h-12 flex items-center justify-center text-primary group-hover:text-primary-dim transition-colors">
<span class="material-symbols-outlined text-4xl" data-icon="settings">settings</span>
</div>
<span class="font-headline font-bold text-[10px] uppercase tracking-[0.15em] text-on-surface-variant">Settings</span>
</button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 bg-[#faf9fc]/80 dark:bg-slate-950/80 backdrop-blur-xl border-t border-[#afb1bc]/15 shadow-[0px_-4px_16px_rgba(47,50,58,0.04)] flex justify-around items-center px-4 pt-3 pb-8">
<!-- Tools (Active) -->
<a class="flex flex-col items-center justify-center text-[#2f323a] dark:text-white font-bold active:scale-90 transition-transform duration-200" href="#">
<span class="material-symbols-outlined mb-1" data-icon="grid_view" style="font-variation-settings: 'FILL' 1;">grid_view</span>
<span class="font-['Inter'] text-[11px] font-medium uppercase tracking-wider">Tools</span>
</a>
<!-- History (Inactive) -->
<a class="flex flex-col items-center justify-center text-[#5c5f68] dark:text-slate-500 hover:text-[#2f323a] dark:hover:text-white transition-colors active:scale-90 transition-transform duration-200" href="#">
<span class="material-symbols-outlined mb-1" data-icon="history">history</span>
<span class="font-['Inter'] text-[11px] font-medium uppercase tracking-wider">History</span>
</a>
<!-- Settings (Inactive) -->
<a class="flex flex-col items-center justify-center text-[#5c5f68] dark:text-slate-500 hover:text-[#2f323a] dark:hover:text-white transition-colors active:scale-90 transition-transform duration-200" href="#">
<span class="material-symbols-outlined mb-1" data-icon="settings">settings</span>
<span class="font-['Inter'] text-[11px] font-medium uppercase tracking-wider">Settings</span>
</a>
</nav>
</body></html>
